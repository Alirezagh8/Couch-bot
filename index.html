<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>برنامه ریزی و کوچینگ علیرضا</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #000000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #f0f0f0;
        }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 15px;
            font-size: 14px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        /* استایل تب‌های روزهای هفته */
        .days-tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color);
        }
        .day-tab {
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            border: none;
        }
        .day-tab.active {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        /* استایل لیست تسک‌ها */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--tg-theme-secondary-bg-color);
            padding: 12px;
            border-radius: 10px;
        }
        .task-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-time {
            font-weight: bold;
            color: var(--tg-theme-button-color);
        }
        .task-title.done {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .btn-edit {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .no-task {
            text-align: center;
            color: gray;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🗓 برنامه هفتگی من</h2>
    </div>

    <div class="days-tabs" id="daysTabs"></div>

    <div class="task-list" id="taskList"></div>

    <script>
        // دیتای تستی برای نمایش اولیه ظاهر صفحه (این دیتا در حالت واقعی باید از دیتابیس خوانده شود)
        let sampleTasks = [
            {id: 1, day: "شنبه", time: "08:30", title: "ورزش صبحگاهی و مدیتیشن", done: false},
            {id: 2, day: "شنبه", time: "10:00", title: "بررسی کامیت‌های گیت‌هاب پروژه", done: true},
            {id: 3, day: "شنبه", time: "15:00", title: "جلسه با تیم فرانت‌بند ربات", done: false},
            {id: 4, day: "یکشنبه", time: "09:00", title: "مطالعه کتاب مدیریت زمان", done: false}
        ];

        const daysOrder = ["شنبه", "یکشنبه", "دوشنبه", "سه‌شنبه", "چهارشنبه", "پنجشنبه", "جمعه"];
        let currentDay = "شنبه";

        // راه‌اندازی اولیه مینی‌اپ تلگرام
        Telegram.WebApp.ready();
        Telegram.WebApp.expand(); // باز شدن صفحه به صورت تمام‌صفحه

        // رندر کردن دکمه‌های روزهای هفته
        function renderTabs() {
            const tabsContainer = document.getElementById('daysTabs');
            tabsContainer.innerHTML = '';
            daysOrder.forEach(day => {
                const button = document.createElement('button');
                button.className = `day-tab ${day === currentDay ? 'active' : ''}`;
                button.innerText = day;
                button.onclick = () => {
                    currentDay = day;
                    renderTabs();
                    renderTasks();
                };
                tabsContainer.appendChild(button);
            });
        }

        // رندر کردن و مرتب‌سازی تسک‌های روز انتخاب شده بر اساس ساعت
        function renderTasks() {
            const listContainer = document.getElementById('taskList');
            listContainer.innerHTML = '';

            // فیلتر کردن تسک‌های روز جاری و مرتب‌سازی از صبح به شب
            let filtered = sampleTasks
                .filter(t => t.day === currentDay)
                .sort((a, b) => a.time.localeCompare(b.time));

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="no-task">تسک یا برنامه‌ای برای ${currentDay} ثبت نشده است.</div>`;
                return;
            }

            filtered.forEach(task => {
                const item = document.createElement('div');
                item.className = 'task-item';

                item.innerHTML = `
                    <div class="task-main">
                        <input type="checkbox" class="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <span class="task-time">⏰ ${task.time}</span>
                        <span class="task-title ${task.done ? 'done' : ''}">${task.title}</span>
                    </div>
                    <button class="btn-edit" onclick="editTask(${task.id})">✏️</button>
                `;
                listContainer.appendChild(item);
            });
        }

        // اکشن تیک زدن تسک و ارسال دیتا به ربات پایتون
        function toggleTask(id) {
            let task = sampleTasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                renderTasks();
                
                // ارسال دیتا به ربات پایتون روی سرور
                Telegram.WebApp.sendData(JSON.stringify({
                    action: "toggle_done",
                    task_id: id
                }));
            }
        }

        // اکشن ویرایش تسک و ارسال دیتا به ربات پایتون
        function editTask(id) {
            let task = sampleTasks.find(t => t.id === id);
            if (task) {
                let newTitle = prompt("عنوان جدید تسک را وارد کنید:", task.title);
                if (newTitle) {
                    task.title = newTitle;
                    renderTasks();
                    
                    // ارسال دیتای ویرایش شده به ربات پایتون روی سرور
                    Telegram.WebApp.sendData(JSON.stringify({
                        action: "edit",
                        task_id: id,
                        title: newTitle,
                        day: task.day,
                        time: task.time
                    }));
                }
            }
        }

        // اجرای اولیه توابع ظاهر صفحه
        renderTabs();
        renderTasks();
    </script>
</body>
</html>
